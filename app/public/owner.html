<!DOCTYPE html>
<html lang="en">

    <title>Owner Portal</title>
    <link rel="stylesheet" href="owner.css">
</head>

<body>

    <div class="card">

        <!-- LOGIN SECTION -->

            <div id="qrList"></div>

        </div>

    </div>

    <script src="owner.js"></script>

</body>
</html>
