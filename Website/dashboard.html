<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h2>My QR Codes</h2>
    <div id="qrContainer"></div>

    <script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login.html";
}

fetch("/api/dashboard", {
    headers: {
        "Authorization": "Bearer " + token
    }
})
.then(res => res.json())
.then(data => {

    const container = document.getElementById("qrContainer");

    if (!data.qrs.length) {
        container.innerHTML = "<p>No QR codes yet.</p>";
        return;
    }

    data.qrs.forEach(qr => {
        const div = document.createElement("div");
        div.innerHTML = `
            <div style="border:1px solid #ddd;padding:15px;margin:15px 0;border-radius:8px;">
                <h3>${qr.qr_id}</h3>
                <p>Status: ${qr.status}</p>
                <p>Plan: ${qr.plan_type}</p>
                <p>Total Scans: ${qr.scan_count}</p>
                <p>Last Scan: ${qr.last_scan || "Never"}</p>
                <img src="/qrcodes/${qr.qr_id}.svg" width="120"/>
                <br><br>
                <a href="/qrcodes/${qr.qr_id}.svg" download>Download QR</a>
            </div>
        `;
        container.appendChild(div);
    });

});
    </script>

</body>
</html>
