<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <!-- HEADER -->
    <header class="topbar">

        <div class="brand">
            <img src="/assets/images/reachoutowner_logo.png" class="logo">
            <span>ReachOutOwner</span>
        </div>

        <button onclick="logout()">Logout</button>

    </header>


    <div class="container">

        <!-- OWNER INFO -->
        <div class="owner-card">
            <h3>Owner Details</h3>

            <div class="owner-grid">
                <div><label>Name</label><span id="ownerName"></span></div>
                <div><label>Mobile</label><span id="ownerMobile"></span></div>
                <div><label>Email</label><span id="ownerEmail"></span></div>
                
            </div>

        </div>


        <!-- QR SETUP -->
        <h3>Setup QR Codes</h3>


        <table class="table">
            <thead>
                <tr>
                    <th>S.N</th>
                    <th>Plan</th>
                    <th>QR ID</th>
                    <th>Created On</th>
                    <th>Asset Type</th>
                    <th>Primary No.</th>
                    <th>Secondary No.</th>
                    <th>Activate</th>
                </tr>
            </thead>

            <tbody id="setupTable"></tbody>

        </table>


        <!-- ACTIVE QR -->
        <h3>Active QR Codes</h3>

        <table class="table">
            <thead>
                <tr>
                    <th>S.N</th>
                    <th>QR ID</th>
                    <th>Asset</th>
                    <th>Expiry</th>
                    <th>Download</th>
                    <th>Deactivate</th>
                </tr>
            </thead>

            <tbody id="activeTable"></tbody>

        </table>

    </div>

    <script src="/js/dashboard.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
