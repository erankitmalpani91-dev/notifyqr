<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login | ReachOutOwner</title>

    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <img src="/assets/images/reachoutowner_logo.png" class="logo">

            <h1>Owner Login</h1>

            <p class="subtitle">
                Manage your QR stickers and protect your assets
            </p>

            <form id="loginForm">

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="phone" inputmode="numeric" pattern="[0-9]*" placeholder="Enter mobile number" required>
                </div>

                

                <button type="submit" class="login-btn">
                    Login
                </button>

            </form>

            <p class="help">
                <a href="javascript:forgotPassword()">Forgot Password?</a> .
                <a href="javascript:void(0)" onclick="contactSupport()">Contact Support</a>
            </p>

        </div>

    </div>


    <script>

        // ✅ LOGIN FORM (NO PASSWORD)
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const phone = document.getElementById("phone").value;
            const btn = document.querySelector(".login-btn");

            if (!phone || phone.length !== 10) {
                alert("Please enter valid mobile number");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending link...";

            try {
                const res = await fetch("/api/auth/send-login-link", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ phone })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem("user_phone", phone);
                    alert("Login link sent to WhatsApp and Email.");
                } else {
                    alert(data.message || "User not found.");
                }

            } catch (err) {
                alert("Server error");
            }

            btn.disabled = false;
            btn.innerText = "Login";
        });


        // ✅ Autofill phone if passed in URL
        const params = new URLSearchParams(window.location.search);
        const phone = params.get("phone");

        if (phone) {
            document.getElementById("phone").value = phone;
        }


        // ✅ Restrict phone input
        const phoneInput = document.getElementById("phone");

        phoneInput.addEventListener("input", function () {

            let value = this.value.replace(/\D/g, "");

            if (value.length > 10) {
                value = value.slice(0, 10);
            }

            if (value.startsWith("0")) {
                value = value.substring(1);
            }

            this.value = value;

        });


        // ✅ Optional support
        function contactSupport() {
            alert("Please contact support at reachoutowner@gmail.com");
        }


        // ✅ Autofill from localStorage (optional)
        window.onload = () => {
            const phone = localStorage.getItem("user_phone");
            if (phone) {
                document.getElementById("phone").value = phone;
            }
        };


        function forgotPassword() {
        const phone = document.getElementById("phone").value;
        if (!phone || phone.length !== 10) {
            alert("Enter mobile number first");
            return;
        }

        fetch("/api/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert("Reset link sent to WhatsApp/Email");
                } else {
                    alert("User not found");
                }
            });
    }

    </script>
</body>
</html>
