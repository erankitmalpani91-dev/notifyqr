<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ReachOutOwner</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
        }

        /* Layout */
        .checkout-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            margin: 25px auto;
            padding: 10px;
        }

        .checkout-left {
            flex: 2;
        }

        .checkout-right {
            flex: 1;
        }

        /* Cards */
        
        .card {
            background: #f1f4ff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e6ff;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 17px;
        }

        /* Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .full {
            grid-column: 1 / -1;
        }

        /* Inputs */
        input, textarea, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        textarea {
            min-height: 65px;
        }

            input:focus, textarea:focus, select:focus {
                border-color: #3a5bff;
                outline: none;
                background: #fff;
            }

        /* Summary */
        .summary {
            position: sticky;
            top: 20px;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #1f3cff;
            margin: 10px 0;
        }

        .pay-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff7a18, #ffb347);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        /* Mobile */
        @media (max-width: 768px) {
            .checkout-wrapper {
                flex-direction: column;
                margin: 10px;
            }

            .card {
                padding: 14px;
                margin-bottom: 10px;
            }

            .form-grid {
                grid-template-columns: 1fr 1fr; /* keep side-by-side on mobile */
            }

            textarea.full {
                grid-column: 1 / -1;
            }

            .total {
                font-size: 20px;
            }
            
        }
    </style>
</head>

<body>

    <div class="checkout-wrapper">

        <!-- LEFT SIDE -->
        <div class="checkout-left">

            <!-- QR + Usage in one card -->
            <div class="card">
                <h3>Number of QR and Usage</h3>
                <div class="form-grid">
                    <input type="number"
                           id="quantity"
                           name="quantity"
                           inputmode="numeric"
                           min="1"
                           step="1"
                           
                           placeholder="Enter number of QRs"
                           required>
                    <select id="assetType">
                        <option value="">Usage (Optional)</option>
                        <option value="car">Car</option>
                        <option value="bike">Bike</option>
                        <option value="bag">Bag</option>
                        <option value="laptop">Laptop</option>
                        <option value="keys">Keys</option>
                        <option value="pet">Pet</option>
                        <option value="child">Child</option>
                        <option value="vehicle">Vehicle</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Contact -->
            <div class="card">
                <h3>Contact Details</h3>
                <div class="form-grid">
                    <input type="text" id="name" required pattern="[A-Za-z ]+" placeholder="Full Name">
                    <input type="text" id="phone" required pattern="[4-9][0-9]{9}" maxlength="10" placeholder="Mobile Number">
                    <input type="email" id="email" required placeholder="Email Address">
                </div>
            </div>

            <!-- Address -->
            <div class="card">
                <h3>Shipping Address</h3>
                <div class="form-grid">
                    <textarea id="address" placeholder="Shipping Address" class="full" required></textarea>
                    <input type="text" id="city" required pattern="[A-Za-z ]+" placeholder="City">
                    <input type="text" id="state" required pattern="[A-Za-z ]+" placeholder="State">
                    <input type="text" id="pincode" required pattern="[0-9]{6}" maxlength="6" placeholder="Pincode">
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE SUMMARY -->
        <div class="checkout-right">
            <div class="card summary">
                <h3>Order Summary</h3>
                <p>QR Protection (1 Year)</p>
                <p>Price per QR: ₹299</p>

                <div class="total">
                    Total ₹<span id="totalPrice">299</span>
                </div>

                <button class="pay-btn" id="payButton">
                    Proceed to Payment
                </button>

                <p style="font-size:12px;color:gray;">
                    Secure payment via Razorpay
                </p>
            </div>
        </div>
    </div>
   
    <script>
        const pricePerQR = 299;
        const qtyInput = document.getElementById("quantity");
        const totalPriceEl = document.getElementById("totalPrice");

        
        /* Input Restrictions */
        document.getElementById("name").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });
        document.getElementById("city").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });
        document.getElementById("state").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });
        document.getElementById("pincode").addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '');
        });
        document.getElementById("phone").addEventListener("input", function () {
            // Remove non-digit characters
            this.value = this.value.replace(/\D/g, '');

            // Enforce max length of 10 digits
            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }

            // Regex: must be exactly 10 digits and start with 4–9
            const phonePattern = /^[4-9]\d{9}$/;

            if (!phonePattern.test(this.value)) {
                this.setCustomValidity("Please enter a valid 10-digit mobile number starting with 4–9");
            } else {
                this.setCustomValidity("");
            }
        });
        const phoneInput = document.getElementById("phone");

        phoneInput.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '');

            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }
        });

        phoneInput.addEventListener("blur", function () {
            const phonePattern = /^[4-9]\d{9}$/;

            if (!phonePattern.test(this.value)) {
                this.setCustomValidity("Enter valid 10-digit mobile number starting with 4–9");
            } else {
                this.setCustomValidity("");
            }
        });

        qtyInput.addEventListener("input", () => {
            let val = qtyInput.value.replace(/[^0-9]/g, "");
            if (val === "") return;
            if (parseInt(val) < 1) val = 1;
            if (parseInt(val) > 50) val = 50;
            qtyInput.value = val;
            totalPriceEl.innerText = val * pricePerQR;
        });

        /* Razorpay */
        document.getElementById("payButton").addEventListener("click", async function () {

            const name = document.getElementById("name");
            const phone = document.getElementById("phone");
            const email = document.getElementById("email");
            const address = document.getElementById("address");
            const city = document.getElementById("city");
            const state = document.getElementById("state");
            const pincode = document.getElementById("pincode");
            const quantity = document.getElementById("quantity");

            const fields = [name, phone, email, address, city, state, pincode, quantity];

            for (let field of fields) {
                if (!field.checkValidity()) {
                    field.reportValidity();
                    return;
                }
            }

            const response = await fetch("/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    quantity: quantity.value,
                    name: name.value,
                    phone: phone.value,
                    email: email.value,
                    asset_type: document.getElementById("assetType").value
                })
            });

            const data = await response.json();

            if (!data.success) {
                alert("Order creation failed");
                return;
            }

            const options = {
                key: data.key,
                amount: data.amount,
                currency: "INR",
                name: "ReachOutOwner",
                description: "QR Subscription",
                order_id: data.orderId,
                handler: async function (response) {

                    const verify = await fetch("/verify-payment", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature,
                            phone: phone.value,
                            email: email.value,
                            name: name.value
                        })
                    });

                    const result = await verify.json();

                    if (result.success) {
                        window.location.href = "/payment-success.html?phone=" + phone.value;
                    } else {
                        alert("Payment verification failed");
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        });
    </script>

</body>
</html>
