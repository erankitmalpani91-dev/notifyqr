<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | ReachOutOwner</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .checkout-container {
            max-width: 420px;
            width: 92%;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

            .checkout-container h2 {
                margin-bottom: 20px;
            }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .checkout-form input,
        .checkout-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            background: #fafafa;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3a5bff, #1f3cff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

            .checkout-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 6px 15px rgba(31,60,255,0.25);
            }

        .plan-summary {
            background: #f1f4ff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e6ff;
        }

        
    </style>

</head>

<body>

    <div class="checkout-container">

        <h2 style="text-align:center; margin-bottom:20px;">
            Secure Your Assets 🔒
        </h2>

        <div class="plan-summary">
            <p><strong>Product:</strong> QR Protection (1 Year)</p>

            <label><strong>Number of QRs:</strong></label>
            <input type="number" id="quantity" value="1" min="1" max="50" style="width:100px;">

            <p style="margin-top:10px;">
                <strong>Total:</strong> ₹<span id="totalPrice">199</span>
            </p>
        </div>

        <form id="checkoutForm" class="checkout-form">

            <input type="text" id="name" placeholder="Full Name" required minlength="3">

            <input type="text"
                   id="phone"
                   placeholder="Mobile Number"
                   required
                   pattern="[1-9][0-9]{9}"
                   maxlength="10">

            <input type="email" id="email" placeholder="Email Address" required>

            <textarea id="address" placeholder="Shipping Address" required></textarea>

            <input type="text" id="city" placeholder="City" required>

            <input type="text" id="state" placeholder="State" required>

            <input type="text" id="pincode" placeholder="Pincode" required pattern="[0-9]{6}">

            <button type="submit" class="checkout-btn">
                Proceed to Payment
            </button>

        </form>

    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>


    <script>
        const phoneInput = document.getElementById("phone");
        const pincodeInput = document.getElementById("pincode");
        const emailInput = document.getElementById("email");

        const pricePerQR = 199;

        const qtyInput = document.getElementById("quantity");
        const totalPriceEl = document.getElementById("totalPrice");

        qtyInput.addEventListener("input", () => {

            let qty = parseInt(qtyInput.value) || 1;

            if (qty < 1) qty = 1;
            if (qty > 50) qty = 50;

            qtyInput.value = qty;

            totalPriceEl.innerText = qty * pricePerQR;

        });

        phoneInput.addEventListener("input", function () {
            // Remove anything that's not a digit
            this.value = this.value.replace(/\D/g, '');

            // Prevent starting with 0
            if (this.value.startsWith("0")) {
                this.value = this.value.slice(1);
            }

            // Limit to 10 digits
            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }
        });

        phoneInput.addEventListener("blur", function () {
            if (!/^[1-9][0-9]{9}$/.test(this.value)) {
                this.setCustomValidity("Enter a valid 10-digit mobile number (cannot start with 0)");
                this.reportValidity();
            } else {
                this.setCustomValidity("");
            }
        });

        pincodeInput.addEventListener("blur", function () {
            if (!/^[0-9]{6}$/.test(this.value)) {
                this.setCustomValidity("Enter a valid 6 digit pincode");
                this.reportValidity();
            } else {
                this.setCustomValidity("");
            }
        });

        emailInput.addEventListener("blur", function () {
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(this.value)) {
                this.setCustomValidity("Enter a valid email address");
                this.reportValidity();
            } else {
                this.setCustomValidity("");
            }
        });



        document.getElementById("checkoutForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const email = document.getElementById("email").value;
            const address = document.getElementById("address").value;
            const city = document.getElementById("city").value;
            const state = document.getElementById("state").value;
            const pincode = document.getElementById("pincode").value;

            // ✅ Calculate quantity before fetch
            const quantityValue = document.getElementById("quantity").value;
            const quantity = Number(quantityValue);
            console.log("Sending quantity:", quantity);

            // ✅ Correct fetch call
            const response = await fetch("/order/create-order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    quantity: quantity,
                    name: name,
                    phone: phone,
                    email: email
                })
            });

            const data = await response.json();
            console.log("ORDER RESPONSE:", data);

            if (!data.orderId) {
                alert("Order creation failed");
                return;
            }

            const options = {
                key: data.key,
                amount: data.amount,
                currency: "INR",
                name: "ReachOutOwner",
                description: "QR Subscription",
                order_id: data.orderId,
                handler: async function (response) {
                    try {
                        const verify = await fetch("/order/verify-payment", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                phone: phone,
                                email: email,
                                name: name
                            })
                        });

                        const result = await verify.json();
                        if (result.success) {
                            window.location.href = "/payment-success.html?phone=" + phone;
                        } else {
                            alert("Payment verification failed");
                        }
                    } catch (err) {
                        console.error("Verification error:", err);
                        alert("Server error during payment verification");
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        });

    </script>

</body>
</html>
