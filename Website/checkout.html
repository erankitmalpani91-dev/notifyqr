<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ReachOutOwner</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
        }

        /* Layout */
        .checkout-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            margin: 25px auto;
            padding: 10px;
        }

        .checkout-left {
            flex: 2;
        }

        .checkout-right {
            flex: 1;
        }

        /* Cards */
        
        .card {
            background: #f1f4ff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e6ff;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 17px;
        }

        /* Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .full {
            grid-column: 1 / -1;
        }

        /* Inputs */
        input, textarea, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        textarea {
            min-height: 65px;
        }

            input:focus, textarea:focus, select:focus {
                border-color: #3a5bff;
                outline: none;
                background: #fff;
            }

        /* Summary */
        .summary {
            position: sticky;
            top: 20px;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #1f3cff;
            margin: 10px 0;
        }

        .pay-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff7a18, #ffb347);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        /* Mobile */
        @media (max-width: 768px) {
            .checkout-wrapper {
                flex-direction: column;
                margin: 10px;
            }

            .card {
                padding: 14px;
                margin-bottom: 10px;
            }

            .form-grid {
                grid-template-columns: 1fr 1fr; /* keep side-by-side on mobile */
            }

            textarea.full {
                grid-column: 1 / -1;
            }

            .total {
                font-size: 20px;
            }
            
        }
    </style>
</head>

<body>

    <div class="checkout-wrapper">

        <!-- LEFT SIDE -->
        <div class="checkout-left">

            <!-- Contact -->
            <div class="card">
                <h3>Contact Details</h3>
                <div class="form-grid">
                    <input type="text" id="name" required pattern="[A-Za-z ]+" placeholder="Full Name">
                    <input type="text" id="phone" required pattern="[6-9][0-9]{9}" maxlength="10" placeholder="Mobile Number">
                    <input type="email" id="email" required placeholder="Email Address">
                </div>
            </div>

            <!-- Address -->
            <div class="card">
                <h3>Shipping Address</h3>
                <div class="form-grid">
                    <textarea id="address" placeholder="Shipping Address" class="full" required></textarea>
                    <input type="text" id="city" required pattern="[A-Za-z ]+" placeholder="City">
                    <input type="text" id="state" required pattern="[A-Za-z ]+" placeholder="State">
                    <input type="text" id="pincode" required pattern="[0-9]{6}" maxlength="6" placeholder="Pincode">
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE SUMMARY -->
        <div class="checkout-right">
            <div class="card summary">
                <h3>Order Summary</h3>

                <div id="orderItems"></div>

                <p>Total QR: <span id="totalQty">0</span></p>

                <div class="total">
                    Total ₹<span id="totalPrice">0</span>
                </div>

                <button class="pay-btn" id="payButton">
                    Proceed to Payment
                </button>

                <p style="font-size:12px;color:gray;">
                    Secure payment via Razorpay
                </p>
            </div>
        </div>
    </div>
   
    <script>
        const prices = {
            car: 299,
            bike: 299,
            carcombo: 699,
            bikecombo: 599,
            bag: 299,
            laptop: 299,
            mobile: 299,
            keys: 299,
            luggage: 299,
            child: 299,
            pet: 299,
            senior: 299,
            doorbell: 299,
            apartment: 299,
            rental: 299,
            office: 299,
            equipment: 299
        };
        let cart = JSON.parse(localStorage.getItem("cart")) || {};

        let totalAmount = 0;
        let totalQty = 0;
        let orderHTML = "";
        let hasItems = false;

        for (let item in cart) {
            if (cart[item] > 0) {

                let qty = cart[item];
                let price = prices[item];
                let itemTotal = qty * price;

                totalQty += qty;
                totalAmount += itemTotal;

                let name = item.replace("combo", " Combo");
                name = name.charAt(0).toUpperCase() + name.slice(1);

                orderHTML += `
                    <p>${name} QR x ${qty} = ₹${itemTotal}</p>
                `;
                    hasItems = true;
            }
        }

        document.getElementById("orderItems").innerHTML = hasItems ? orderHTML : '<p>Your cart is empty. <a href="https://reachoutowner.com/#plans">Browse QR plans</a></p>';
        document.getElementById("totalPrice").innerText = totalAmount;
        document.getElementById("totalQty").innerText = totalQty;

        if (totalAmount === 0) {
            const btn = document.getElementById("payButton");
            btn.disabled = true;
            btn.innerText = "Your cart is empty";
            btn.style.opacity = "0.5";
            btn.style.cursor = "not-allowed";
        }
        
        /* Input Restrictions */
        document.getElementById("name").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });
        document.getElementById("city").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });
        document.getElementById("state").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });
        document.getElementById("pincode").addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '');
        });
        const phoneInput = document.getElementById("phone");

        phoneInput.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '');

            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }
        });

        phoneInput.addEventListener("blur", function () {
            const phonePattern = /^[4-9]\d{9}$/;

            if (!phonePattern.test(this.value)) {
                this.setCustomValidity("Enter valid 10-digit mobile number starting with 4–9");
            } else {
                this.setCustomValidity("");
            }
        });

        

        /* Razorpay */
        document.getElementById("payButton").addEventListener("click", async function() {

            const btn = document.getElementById("payButton");
            btn.disabled = true;
            btn.innerText = "Processing...";

            const name = document.getElementById("name");
            const phone = document.getElementById("phone");
            const email = document.getElementById("email");
            const address = document.getElementById("address");
            const city = document.getElementById("city");
            const state = document.getElementById("state");
            const pincode = document.getElementById("pincode");

            const fields = [name, phone, email, address, city, state, pincode];

            for (let field of fields) {
                            if (!field.checkValidity()) {
                                field.reportValidity();
                                btn.disabled = false;
                                btn.innerText = "Proceed to Payment";
                                return;
                            }
                        }

            /* Filter cart to remove zero quantity items */
            let filteredCart = {};
            for (const [type, qty] of Object.entries(cart)) {
                if (qty > 0) filteredCart[type] = qty;
            }

            const response = await fetch("/api/order/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    quantity: totalQty,
                    cart: filteredCart,
                    name: name.value,
                    phone: phone.value,
                    email: email.value,
                    address: address.value,
                    city: city.value,
                    state: state.value,
                    pincode: pincode.value
                })
            });        

            const data = await response.json();

            if (!data.success) {
                    alert("Order creation failed");
                    btn.disabled = false;
                    btn.innerText = "Proceed to Payment";
                    return;
            }

            const options = {
                key: data.key,
                amount: data.amount,
                currency: "INR",
                name: "ReachOutOwner",
                description: "QR Protection",
                order_id: data.orderId,
                handler: async function (response) {

                    const verify = await fetch("/api/order/verify-payment", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature,
                            phone: phone.value,
                            email: email.value,
                            name: name.value
                        })
                    });

                    const result = await verify.json();

                    if (result.success) {
                        localStorage.removeItem("cart");
                        sessionStorage.setItem("paymentName", name.value);
                        window.location.href = "/payment-success.html";
                    } else {
                        alert("Payment verification failed");
                        btn.disabled = false;
                        btn.innerText = "Proceed to Payment";
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        });
    </script>

</body>
</html>
